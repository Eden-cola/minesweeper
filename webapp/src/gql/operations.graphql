query GetMe {
  me {
    id
    name
    score
    createdAt
  }
}

query GetMyScore {
  myScore
}

query GetGame($id: ID!) {
  game(id: $id) {
    id
    status
    rows
    cols
    mines
    cells {
      row
      col
      isRevealed
      isMine
      isFlagged
      adjacentMines
    }
    scoreChange
    remainingCells
    players {
      id
      userId
      user {
        id
        name
        score
      }
      score
      joinedAt
    }
    createdAt
    updatedAt
  }
}

query GetMyGames {
  myGames {
    id
    status
    rows
    cols
    mines
    scoreChange
    remainingCells
    createdAt
    updatedAt
  }
}

mutation CreateGame($input: CreateGameInput!) {
  createGame(input: $input) {
    id
    status
    rows
    cols
    mines
    cells {
      row
      col
      isRevealed
      isMine
      isFlagged
      adjacentMines
    }
    scoreChange
    remainingCells
    players {
      id
      userId
      user {
        id
        name
        score
      }
      score
      joinedAt
    }
    createdAt
    updatedAt
  }
}

mutation RevealCell($input: RevealCellInput!) {
  revealCell(input: $input) {
    cell {
      row
      col
      isRevealed
      isMine
      isFlagged
      adjacentMines
    }
    scoreChange
    game {
      id
      status
      scoreChange
      remainingCells
      cells {
        row
        col
        isRevealed
        isMine
        isFlagged
        adjacentMines
      }
    }
  }
}

mutation ToggleFlag($input: ToggleFlagInput!) {
  toggleFlag(input: $input) {
    id
    status
    rows
    cols
    mines
    cells {
      row
      col
      isRevealed
      isMine
      isFlagged
      adjacentMines
    }
    scoreChange
    remainingCells
    players {
      id
      userId
      user {
        id
        name
        score
      }
      score
      joinedAt
    }
    createdAt
    updatedAt
  }
}

subscription GameStateUpdated($gameId: ID!) {
  gameStateUpdated(gameId: $gameId) {
    gameId
    game {
      id
      status
      scoreChange
      remainingCells
      cells {
        row
        col
        isRevealed
        isMine
        isFlagged
        adjacentMines
      }
      players {
        id
        userId
        user {
          id
          name
          score
        }
        score
        joinedAt
      }
    }
    timestamp
  }
}

subscription CellRevealed($gameId: ID!) {
  cellRevealed(gameId: $gameId) {
    gameId
    cell {
      row
      col
      isRevealed
      isMine
      isFlagged
      adjacentMines
    }
    revealedBy {
      id
      userId
      user {
        id
        name
        score
      }
      score
      joinedAt
    }
    scoreChange
    timestamp
  }
}

subscription PlayerUpdated($gameId: ID!) {
  playerUpdated(gameId: $gameId) {
    gameId
    player {
      id
      userId
      user {
        id
        name
        score
      }
      score
      joinedAt
    }
    action
  }
}
